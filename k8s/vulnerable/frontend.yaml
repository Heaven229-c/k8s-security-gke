apiVersion: apps/v1
kind: Deployment
metadata:
  name: frontend
  namespace: vulnerable
spec:
  replicas: 1
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      containers:
      - name: nginx
        image: gcr.io/cap2-493103/frontend:v1
        ports:
        - containerPort: 80
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: vulnerable
spec:
  selector:
    app: frontend
  ports:
  - port: 80