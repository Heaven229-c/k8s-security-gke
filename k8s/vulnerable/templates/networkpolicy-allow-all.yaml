# Explicit allow-all baseline (for demonstration)
# This baseline is intentionally insecure and will be tightened in later weeks.
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: allow-all
  namespace: vulnerable
spec:
  podSelector: {}
  policyTypes:
  - Ingress
  - Egress
  ingress:
  - {}
  egress:
  - {}