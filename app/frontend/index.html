<!DOCTYPE html>
<html>
<head>
  <title>K8s Security Lab</title>
  <style>
    body { font-family: Arial; max-width: 900px; margin: 40px auto; padding: 20px; }
    button { padding: 10px 20px; margin: 5px; background: #01696f; color: white; border: none; border-radius: 5px; }
    pre { background: #f5f5f5; padding: 16px; border-radius: 8px; }
  </style>
</head>
<body>
  <h1>K8s Security Lab</h1>
  <p>Frontend này gọi API qua port-forward localhost để phục vụ debug tuần 0.</p>
  <button onclick="testProfile()">Profile</button>
  <button onclick="testDebug()">Debug</button>
  <button onclick="testExec()">Exec</button>
  <pre id="out">Click button để test...</pre>

  <script>
  const API_BASE = "http://localhost:8080";

  async function testProfile() {
    try {
      const res = await fetch(`${API_BASE}/api/profile`);
      document.getElementById('out').textContent = await res.text();
    } catch(e) {
      document.getElementById('out').textContent = `Error: ${e.message}`;
    }
  }

  async function testDebug() {
    try {
      const res = await fetch(`${API_BASE}/debug`);
      document.getElementById('out').textContent = await res.text();
    } catch(e) {
      document.getElementById('out').textContent = `Error: ${e.message}`;
    }
  }

  async function testExec() {
    try {
      const res = await fetch(`${API_BASE}/debug/exec?cmd=whoami`);
      document.getElementById('out').textContent = await res.text();
    } catch(e) {
      document.getElementById('out').textContent = `Error: ${e.message}`;
    }
  }
  </script>
</body>
</html>
